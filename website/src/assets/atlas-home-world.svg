      <stop offset=".38" stop-color="#274B51" stop-opacity=".26"/>
      <stop offset=".59" stop-color="#A8CFC6" stop-opacity=".18"/>
      <stop offset=".78" stop-color="#E8C99E" stop-opacity=".22"/>
