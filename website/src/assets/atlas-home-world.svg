  <path d="M-50 4930c269-127 504-113 711-42 252 86 472 74 829-88" stroke="#6C928A" stroke-opacity=".2" stroke-width="2"/>
  <path d="M-75 4990c297-118 511-86 722-25 260 75 485 58 884-117" stroke="#6C928A" stroke-opacity=".12"/>

